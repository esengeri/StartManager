name: Python application static analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Установка Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    - name: Установка линтера Flake8
      run: pip install flake8

    - name: Проверка качества кода (Статический анализ)
      run: |
        # Критические ошибки
        flake8 . --exclude=venv,__pycache__,.git --count --select=E9,F63,F7,F82 --show-source --statistics
    
        # Стиль
        flake8 . --exclude=venv,__pycache__,.git --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
